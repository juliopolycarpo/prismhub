name: Verify

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: verify-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (check · build · boundaries)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run final handoff gate
        run: bun run verify

      - name: Verify web-assets release build fails without dashboard dist
        working-directory: packages/web-assets
        run: |
          rm -rf ../../apps/web/dist src/manifest.generated.ts
          set +e
          output="$(bun run build 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$output"
          if [ "$status" -eq 0 ]; then
            printf '%s\n' 'web-assets build should fail without apps/web/dist' >&2
            exit 1
          fi
          case "$output" in
            *DashboardNotBuiltError*) ;;
            *)
              printf '%s\n' 'Expected DashboardNotBuiltError when dashboard dist is missing' >&2
              exit 1
              ;;
          esac
