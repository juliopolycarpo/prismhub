name: Verify

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: verify-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    uses: ./.github/workflows/run-command.yml
    secrets: inherit
    with:
      jobName: Verify (check · build · boundaries)
      turboTeam: ${{ vars.TURBO_TEAM }}
      turboApi: ${{ vars.TURBO_API }}
      timeoutMinutes: 30
      command: bun run verify
