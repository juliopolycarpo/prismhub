name: Verify

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

concurrency:
  group: verify-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    uses: ./.github/workflows/run-command.yml
    with:
      jobName: Verify (check · build · boundaries · web-assets fail-fast)
      timeoutMinutes: 30
      command: |
        bun run verify
        bun run check:web-assets-failfast
