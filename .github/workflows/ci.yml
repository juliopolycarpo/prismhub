name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Verify (check · build · boundaries)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .turbo
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify (check → build → boundaries)
        # Single fail-fast handoff command. Runs the full local contract:
        #   check       — typecheck, lint, format, unit/integration/e2e, coverage, policy
        #   build       — workspace build
        #   boundaries  — turbo dependency boundaries (no missing/cyclic deps)
        run: bun run verify

      - name: Verify fail-fast build (no web dist)
        run: |
          rm -rf apps/web/dist
          if bun run build 2>/dev/null; then
            echo "Build should have failed without apps/web/dist" >&2
            exit 1
          fi
          echo "Build correctly failed without apps/web/dist"
