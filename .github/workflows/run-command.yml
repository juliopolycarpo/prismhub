name: Run Bun Command

on:
  workflow_call:
    inputs:
      jobName:
        description: Display name for the job.
        required: true
        type: string
      command:
        description: Bun command or shell script to run from the repository root.
        required: true
        type: string
      timeoutMinutes:
        description: Job timeout in minutes.
        required: false
        default: 20
        type: number
      uploadArtifacts:
        description: Upload test artifacts from .prismhub/tests after the command finishes.
        required: false
        default: false
        type: boolean
      artifactName:
        description: Artifact name when upload-artifacts is enabled.
        required: false
        default: test-results
        type: string

permissions:
  contents: read

jobs:
  run:
    name: ${{ inputs.jobName }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeoutMinutes }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup workspace
        uses: ./.github/actions/setup-bun

      - name: Run command
        shell: bash
        run: ${{ inputs.command }}

      - name: Upload test artifacts
        if: ${{ always() && inputs.uploadArtifacts }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifactName }}
          path: .prismhub/tests
          if-no-files-found: ignore
