name: Check

on:
  push:
    branches: ['**']

permissions:
  contents: read

concurrency:
  group: check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    uses: ./.github/workflows/run-command.yml
    secrets: inherit
    with:
      jobName: Check (typecheck · lint · format · policy · boundaries)
      enableRemoteCache: true
      turboTeam: ${{ vars.TURBO_TEAM }}
      turboApi: ${{ vars.TURBO_API }}
      timeoutMinutes: 20
      command: |
        bun run typecheck
        bun run lint
        bun run format
        bun run test:policy
        bun run boundaries
