name: Check

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    uses: ./.github/workflows/run-command.yml
    with:
      jobName: Check (typecheck · lint · format · policy · boundaries)
      timeoutMinutes: 20
      command: |
        bun run typecheck
        bun run lint
        bun run format
        bun run test:policy
        bun run boundaries
