name: Check

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: check-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check (typecheck · lint · format · policy · boundaries)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup workspace
        uses: ./.github/actions/setup-bun

      - name: Run quality gates
        run: |
          bun run typecheck
          bun run lint
          bun run format
          bun run test:policy

      - name: Check workspace boundaries
        run: bun run boundaries
